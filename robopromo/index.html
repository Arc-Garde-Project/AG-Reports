<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#060D18">
<title>RoboPromo AI Campaign Reports</title>
<meta name="description" content="Campaign reports for RoboPromo AI. Performance dashboards and organic content KPI tracking.">
<meta property="og:title" content="RoboPromo AI Campaign Reports">
<meta property="og:description" content="Campaign reports for RoboPromo AI. Performance dashboards and organic content KPI tracking.">
<meta property="og:image" content="https://ag-reports.vercel.app/assets/og-banner.png">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060D18;
  --card: #0A1520;
  --border: #122035;
  --text: #E8EDF5;
  --muted: #6B7A8D;
  --accent: #0077B6;
  --accent-lt: #00B4D8;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 0%, rgba(0,180,216,0.06) 0%, transparent 60%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
a{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
a:focus-visible{outline:2px solid var(--accent-lt);outline-offset:2px}
.portal { text-align: center; padding: 60px 24px; max-width: 600px; width: 100%; }
.logo-link { display: inline-block; margin-bottom: 12px; }
.logo-link img { max-width: 260px; display: block; }
.subtitle { font-size: 14px; color: var(--muted); font-weight: 400; letter-spacing: 1px; }
.divider {
  width: 140px; height: 2px; margin: 24px auto 32px; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-lt));
}
.section-label {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: #3A5068; font-weight: 600; margin-bottom: 14px;
}
.reports { display: flex; flex-direction: column; gap: 12px; align-items: center; }
.report-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; border-radius: 14px; width: 100%; max-width: 400px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.02);
  color: #8899A6; font-size: 15px; font-weight: 600; text-decoration: none;
  transition: all 0.3s ease; min-height: 48px; position: relative; overflow: hidden;
}
.report-link::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-lt));
  opacity: 0; transition: opacity 0.3s;
}
@media(hover:hover){
  .report-link:hover { border-color: rgba(0,180,216,0.3); color: #fff; background: rgba(0,180,216,0.06); transform: translateY(-2px); }
  .report-link:hover::before { opacity: 1; }
}
.report-link:active { background: rgba(0,180,216,0.08); }
.report-badge {
  font-size: 10px; color: #4ADE80; font-weight: 700; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 6px; background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.12);
}
.report-date { font-size: 12px; color: #3A5068; font-weight: 400; margin-top: 2px; }
.footer { margin-top: 48px; }
.footer a {
  color: #3A5068; font-size: 10px; letter-spacing: 3px; text-decoration: none;
  text-transform: uppercase; transition: color 0.3s; font-weight: 600;
}
@media(hover:hover){.footer a:hover { color: var(--accent-lt); }}
@media(max-width:480px){
  .portal{padding:40px 16px}
  .report-link{padding:16px 20px;font-size:14px}
}
@media(prefers-reduced-motion:reduce){*{transition-duration:0.01ms!important}}
</style>
</head>
<body>
<div class="portal">
  <a href="https://www.robopromo.ai/" target="_blank" class="logo-link">
    <img src="https://framerusercontent.com/images/cZMPA2qkx3yORnq5yadUCAOutNo.png" alt="RoboPromo AI">
  </a>
  <div class="subtitle">Campaign Reports</div>
  <div class="divider"></div>
  <div class="section-label">Monthly KPI Reports</div>
  <div class="reports">
    <a href="/robopromo/feb-2026" class="report-link">
      <div>February 2026<div class="report-date">Organic Content - 7 Platforms</div></div>
      <span class="report-badge">LATEST</span>
    </a>
  </div>
  <div class="footer">
    <a href="https://www.arcgarde.com" target="_blank">Arc Garde</a>
  </div>
</div>
</body>
</html>
